<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
   
	flex-direction:column;
    background: #F5EFE0;
    font-family: 'Amiri', serif;
  }

  .login-box {
    background: #FDFAF4;
    border: 2px solid #C4A265;
    border-radius: 18px;
    padding: 36px 32px;
   width:98%;
   max-width: 320px;
    box-shadow: 0 8px 32px rgba(61,43,31,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
  }

  .login-box h2 {
    text-align: center;
    color: #3D2B1F;
    font-size: 22px;
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }

  input {
    width: 100%;
    padding: 12px 16px;
    margin-bottom: 14px;
    border: 1.5px solid #C4A265;
    border-radius: 10px;
    background: #E8D5B0;
    color: #3D2B1F;
    font-family: 'Amiri', serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input::placeholder { color: #8B6B4A; }

  input:focus {
    border-color: #8B5E3C;
    box-shadow: 0 0 0 3px rgba(139,94,60,0.15);
  }

  button {
    width: 100%;
    padding: 13px;
    background: #8B5E3C;
    color: #F5EFE0;
    border: none;
    border-radius: 10px;
    font-family: 'Amiri', serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  button:hover { background: #6B4629; }
  button:active { transform: scale(0.98); }

  .error-msg {
    color: #8B0000;
    background: #fdecea;
    border: 1px solid #e57373;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
    text-align: center;
    margin-top: 10px;
    display: none;
  }
  .pic1{
  width:250px;
	height:250px;
	margin:10px;
  }
</style>
</head>
<body>
 <img src="1.png" class="pic1"></div>
 <div class="login-box">
    <h2>تسجيل الدخول</h2>
    <input type="text" id="username" placeholder="اسم المستخدم" />
    <input type="password" id="password" placeholder="كلمة المرور" />
    <button onclick="checkLogin()">دخول</button>
    <div class="error-msg" id="errorMsg">❌ اسم المستخدم أو كلمة المرور غلط</div>
  </div>

  <script>
 
	var nextPage = "home.html"; // ← غيّر اسم الصفحة التانية هنا

    // لو سبق دخل قبل كده يروح على طول
    if (localStorage.getItem('loggedIn') === 'true') {
      window.location.href = nextPage;
    }

    function checkLogin() {
      var user = document.getElementById('username').value.trim();
      var pass = document.getElementById('password').value.trim();

      var correctUser = "admin"; // ← غيّر الـ username هنا
      var correctPass = "1234";  // ← غيّر الـ password هنا

      if (user === correctUser && pass === correctPass) {
        localStorage.setItem('loggedIn', 'true');
        window.location.href = nextPage;
      } else {
        var err = document.getElementById('errorMsg');
        err.style.display = 'block';
        setTimeout(function(){ err.style.display = 'none'; }, 3000);
      }
    }

    // دخول بالـ Enter
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkLogin();
    });
  </script>
</body>
</html>
